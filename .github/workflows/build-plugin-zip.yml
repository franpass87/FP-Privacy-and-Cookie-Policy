name: Build plugin ZIP

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PHP syntax
        run: |
          find fp-privacy-cookie-policy -type f -name '*.php' -print0 \
            | xargs -0 -n1 -P 4 php -l

      - name: Build plugin zip
        run: |
          plugin_dir="fp-privacy-cookie-policy"
          zip_file="${plugin_dir}.zip"
          rm -f "${zip_file}"
          zip -r "${zip_file}" "${plugin_dir}" \
            -x '*.DS_Store' '*.git*' '*node_modules/*' '*tests/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fp-privacy-cookie-policy-zip
          path: fp-privacy-cookie-policy.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fp-privacy-cookie-policy-zip
          path: ./dist

      - name: Publish release asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/fp-privacy-cookie-policy.zip
